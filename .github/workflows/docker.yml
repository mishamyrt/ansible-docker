name: Docker

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

env:
  IMAGE_NAME: mishamyrt/ansible

jobs:
  docker:
    name: Build and test image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        continue-on-error: true
        run: docker run --rm -v "$PWD:/work" -w /work hadolint/hadolint:latest-alpine hadolint Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          target: ansible
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Test image
        run: docker run --rm "${IMAGE_NAME}:${GITHUB_SHA}" ansible-playbook --version

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: mishamyrt
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<< "${DOCKER_METADATA_OUTPUT_TAGS}"
